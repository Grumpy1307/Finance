                };

                const detectCategory = (note) => {
                    const n = note.toUpperCase();
                    if (n.includes('EMI') || n.includes('LOAN') || n.includes('ACH DEBIT') || n.includes('REPAYMENT') || n.includes('FINANCE')) return 'Loan EMI';
                    if (n.includes('FOOD') || n.includes('SWIGGY') || n.includes('ZOMATO') || n.includes('RESTAURANT') || n.includes('CAFE') || n.includes('DINER')) return 'Food';
                    if (n.includes('PETROL') || n.includes('FUEL') || n.includes('PUMP') || n.includes('SHELL') || n.includes('BPCL') || n.includes('IOCL') || n.includes('HPCL')) return 'Petrol';
                    if (n.includes('UBER') || n.includes('OLA') || n.includes('RAPIDO') || n.includes('TAXI') || n.includes('CAB')) return 'Transport';
                    if (n.includes('GROCERY') || n.includes('MART') || n.includes('SUPERMARKET') || n.includes('BIGBASKET') || n.includes('BLINKIT') || n.includes('ZEPTO')) return 'Shopping';
                    if (n.includes('HOSPITAL') || n.includes('CLINIC') || n.includes('PHARMACY') || n.includes('MEDICAL') || n.includes('DOCTOR')) return 'Health';
                    if (n.includes('AMAZON') || n.includes('FLIPKART') || n.includes('MYNTRA') || n.includes('AJIO')) return 'Shopping';
                    if (n.includes('NETFLIX') || n.includes('SPOTIFY') || n.includes('PRIME') || n.includes('YOUTUBE') || n.includes('HOTSTAR')) return 'Entertainment';
                    if (n.includes('INSURANCE') || n.includes('LIC') || n.includes('PREMIUM')) return 'Insurance Premium';
                    if (n.includes('BILL') || n.includes('RECHARGE') || n.includes('JIO') || n.includes('AIRTEL') || n.includes('VI')) return 'Mobile Bill';
                    return 'Other';
                };

                const amountRe = /-?\d{1,3}(?:,\d{3})*(?:\.\d{1,2})?/g;
                const uniq = new Map();

                (lines || []).forEach(lineRaw => {
                    const line = String(lineRaw || '').replace(/\s+/g, ' ').trim();
                    if (!line) return;

                    const dateMatch = line.match(/(\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|\d{1,2}\s+[A-Za-z]{3}\s+\d{2,4})/);
                    if (!dateMatch) return;

                    const dateIso = normalizeDate(dateMatch[1].replace(/\s+/g, ' ').trim());
                    if (!dateIso) return;

                    const afterDate = line.slice(line.indexOf(dateMatch[1]) + dateMatch[1].length).trim();
                    const amountsRaw = afterDate.match(amountRe) || [];
                    const amounts = amountsRaw
                        .map(a => parseFloat(String(a).replace(/,/g, '')))
                        .filter(n => Number.isFinite(n) && n !== 0);
                    if (!amounts.length) return;

                    let amount = amounts.length >= 2 ? amounts[amounts.length - 2] : amounts[0];
                    amount = Math.abs(amount);

                    const isCredit = /\b(CR|CREDIT)\b/i.test(afterDate);
                    const isDebit = /\b(DR|DEBIT)\b/i.test(afterDate);
                    const type = isCredit && !isDebit ? 'income' : 'expense';

                    let note = afterDate;
                    amountsRaw.forEach(a => { note = note.replace(a, ' '); });
                    note = note.replace(/\b(CR|DR|CREDIT|DEBIT)\b/gi, ' ').replace(/\s+/g, ' ').trim();
                    if (!note) note = 'Imported from statement';

                    const entry = {
                        selected: true,
                        date: dateIso,
                        type,
                        amount: Math.round(amount * 100) / 100,
                        category: type === 'income' ? 'Other' : detectCategory(note),
                        payee: utils.extractPayee(note),
                        note,
                        accountId: 'cash'
                    };

                    const key = `${entry.date}|${entry.type}|${entry.amount.toFixed(2)}|${entry.note.toLowerCase()}`;
                    if (!uniq.has(key)) uniq.set(key, entry);
                });

                return Array.from(uniq.values()).sort((a, b) => new Date(a.date) - new Date(b.date));
            },
            parseStatementRows: (rows, lines) => {
                const kotak = ui.parseKotakStatementRows(rows);
                if (kotak.length >= 3) return kotak;
                return ui.parseStatementLines(lines);
            },
            parseKotakStatementRows: (rows) => {
                const normalizeDate = (raw) => {
                    if (!raw) return null;
                    const s = String(raw).trim().replace(/\s+/g, ' ');
                    const m = s.match(/^(\d{1,2})\s+([A-Za-z]{3})\s+(\d{2,4})$/);
                    if (!m) return null;
                    const dd = String(m[1]).padStart(2, '0');
                    const mon = m[2].toLowerCase();
                    const months = { jan: '01', feb: '02', mar: '03', apr: '04', may: '05', jun: '06', jul: '07', aug: '08', sep: '09', oct: '10', nov: '11', dec: '12' };
                    const mm = months[mon];
                    if (!mm) return null;
                    let yyyy = String(m[3]);
                    if (yyyy.length === 2) yyyy = String(2000 + parseInt(yyyy, 10));
                    return `${yyyy}-${mm}-${dd}`;
                };

                const detectCategory = (note) => {
                    const n = note.toUpperCase();
                    if (n.includes('EMI') || n.includes('LOAN') || n.includes('ACH DEBIT') || n.includes('REPAYMENT') || n.includes('FINANCE')) return 'Loan EMI';
                    if (n.includes('FOOD') || n.includes('SWIGGY') || n.includes('ZOMATO') || n.includes('RESTAURANT') || n.includes('CAFE') || n.includes('DINER')) return 'Food';
                    if (n.includes('PETROL') || n.includes('FUEL') || n.includes('PUMP') || n.includes('SHELL') || n.includes('BPCL') || n.includes('IOCL') || n.includes('HPCL')) return 'Petrol';
                    if (n.includes('UBER') || n.includes('OLA') || n.includes('RAPIDO') || n.includes('TAXI') || n.includes('CAB')) return 'Transport';
                    if (n.includes('GROCERY') || n.includes('MART') || n.includes('SUPERMARKET') || n.includes('BIGBASKET') || n.includes('BLINKIT') || n.includes('ZEPTO')) return 'Shopping';
                    if (n.includes('HOSPITAL') || n.includes('CLINIC') || n.includes('PHARMACY') || n.includes('MEDICAL') || n.includes('DOCTOR')) return 'Health';
                    if (n.includes('AMAZON') || n.includes('FLIPKART') || n.includes('MYNTRA') || n.includes('AJIO')) return 'Shopping';
                    if (n.includes('NETFLIX') || n.includes('SPOTIFY') || n.includes('PRIME') || n.includes('YOUTUBE') || n.includes('HOTSTAR')) return 'Entertainment';
                    if (n.includes('INSURANCE') || n.includes('LIC') || n.includes('PREMIUM')) return 'Insurance Premium';
                    if (n.includes('BILL') || n.includes('RECHARGE') || n.includes('JIO') || n.includes('AIRTEL') || n.includes('VI')) return 'Mobile Bill';
                    return 'Other';
                };

                const moneyRe = /-?\d[\d,]*\.\d{2}$/;
                const parseMoney = (s) => {
                    const n = parseFloat(String(s).replace(/,/g, ''));
                    return Number.isFinite(n) ? n : null;
                };

                const findDateInParts = (parts) => {
                    for (let i = 0; i < parts.length; i++) {
                        const a = (parts[i]?.str || '').trim();
                        if (!a) continue;
                        const iso1 = normalizeDate(a);
                        if (iso1) return { date: iso1, x: parts[i].x, iStart: i, iEnd: i };
                        const b = (parts[i + 1]?.str || '').trim();
                        const c = (parts[i + 2]?.str || '').trim();
                        if (a && b && c) {
                            const iso2 = normalizeDate(`${a} ${b} ${c}`);
                            if (iso2) return { date: iso2, x: parts[i].x, iStart: i, iEnd: i + 2 };
                        }
                    }
                    return null;
                };

                const allNumericXs = [];
                const candidates = [];

                (rows || []).forEach(r => {
                    const parts = Array.isArray(r?.parts) ? r.parts : [];
                    if (!parts.length) return;
                    const dt = findDateInParts(parts);
                    if (!dt) return;

                    const nums = parts
                        .map(p => ({ ...p, raw: String(p.str || '').trim() }))
                        .filter(p => p.raw && moneyRe.test(p.raw))
                        .map(p => ({ x: p.x, raw: p.raw, value: parseMoney(p.raw) }))
                        .filter(p => p.value != null);

                    if (nums.length < 2) return;

                    nums.sort((a, b) => a.x - b.x);
                    const balance = nums[nums.length - 1];
                    const txn = nums[nums.length - 2];

                    allNumericXs.push(balance.x, txn.x);

                    candidates.push({ date: dt.date, dateX: dt.x, parts, txn, balance });
                });

                const uniqXs = Array.from(new Set(allNumericXs.map(x => Math.round(x)))).sort((a, b) => a - b);
                if (uniqXs.length < 2) return [];

                const kmeans1d = (xs, k) => {
                    const points = xs.slice().sort((a, b) => a - b);
                    if (!points.length) return [];
                    const unique = Array.from(new Set(points));
                    if (unique.length <= k) return unique;
                    const q = (p) => points[Math.max(0, Math.min(points.length - 1, Math.floor((points.length - 1) * p)))];
                    let centers = k === 3 ? [q(0.15), q(0.5), q(0.85)] : [q(0.25), q(0.75)].slice(0, k);
                    for (let iter = 0; iter < 12; iter++) {
                        const buckets = centers.map(() => []);
                        points.forEach(x => {
                            let best = 0;
                            let bestD = Math.abs(x - centers[0]);
                            for (let i = 1; i < centers.length; i++) {
                                const d = Math.abs(x - centers[i]);
                                if (d < bestD) { bestD = d; best = i; }
                            }
                            buckets[best].push(x);
                        });
                        const next = [];
                        for (let i = 0; i < buckets.length; i++) {
                            if (!buckets[i].length) continue;
                            const mean = buckets[i].reduce((s, v) => s + v, 0) / buckets[i].length;
                            next.push(mean);
                        }
                        centers = next.sort((a, b) => a - b);
                        if (centers.length < 2) break;
                    }
                    return centers;
                };

                const centers = kmeans1d(allNumericXs, 3).sort((a, b) => a - b);
                if (centers.length < 2) return [];
                const balanceCenter = centers[centers.length - 1];
                const depositCenter = centers.length >= 3 ? centers[1] : null;
                const withdrawalCenter = centers.length >= 3 ? centers[0] : null;

                const nearestCenter = (x) => {
                    let best = centers[0];
                    let bestD = Math.abs(x - best);
                    for (let i = 1; i < centers.length; i++) {
                        const c = centers[i];
                        const d = Math.abs(x - c);
                        if (d < bestD) { bestD = d; best = c; }
                    }
                    return best;
                };

                const entriesUniq = new Map();

                candidates.forEach(row => {
                    const txnX = row.txn.x;
                    const bucket = nearestCenter(txnX);

                    let type = 'expense';
                    if (depositCenter != null && withdrawalCenter != null) {
                        if (Math.abs(bucket - depositCenter) < Math.abs(bucket - withdrawalCenter)) type = 'income';
                        else type = 'expense';
                    } else {
                        const rowText = row.parts.map(p => String(p.str || '')).join(' ');
                        const isCredit = /\b(CR|CREDIT)\b/i.test(rowText);
                        const isDebit = /\b(DR|DEBIT)\b/i.test(rowText);
                        type = isCredit && !isDebit ? 'income' : 'expense';
                    }

                    const amount = Math.abs(row.txn.value);

                    const cutoffRight = Math.min(txnX, row.balance.x) - 6;
                    const descParts = row.parts
                        .filter(p => p.x > row.dateX + 10 && p.x < cutoffRight)
                        .map(p => String(p.str || '').trim())
                        .filter(Boolean)
                        .filter(s => !moneyRe.test(s));
                    let note = descParts.join(' ').replace(/\s+/g, ' ').trim();
                    if (!note) {
                        const rowText = row.parts.map(p => String(p.str || '')).join(' ');
                        note = rowText.replace(/\s+/g, ' ').trim();
                    }

                    const entry = {
                        selected: true,
                        date: row.date,
                        type,
                        amount: Math.round(amount * 100) / 100,
                        category: type === 'income' ? 'Other' : detectCategory(note),
                        note,
                        accountId: 'cash'
                    };

                    const key = `${entry.date}|${entry.type}|${entry.amount.toFixed(2)}|${String(entry.note || '').trim().toLowerCase()}`;
                    if (!entriesUniq.has(key)) entriesUniq.set(key, entry);
                });

                return Array.from(entriesUniq.values()).sort((a, b) => new Date(a.date) - new Date(b.date));
            },

                    downloadAnchor.setAttribute("href", dataStr);

                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const imported = JSON.parse(evt.target.result);
                        if (imported.transactions && imported.settings) {
                            if (confirm("This will overwrite all active transactions, cards, loans, and settings. Are you sure you want to proceed?")) {
                                store.data = imported;
                                store.save();
                                alert("Data imported successfully!");
                                location.reload();

                        } else {
                            alert("Invalid backup file structure! Please use a valid ProFinance JSON backup.");
                        }
                    } catch (err) {
                        alert("Failed to parse JSON backup file: " + err.message);
                    }
                };
                reader.readAsText(file);

                if (!store) {
                    console.error("Store not initialized");
                    return;

                if (store.currentUserId) {
                    ui.populateMonthSelect();
                    
                    // Check for automatic deductions (EMIs)
                    store.checkAutoDeductions();
                    
                    router.navigate('dashboard');

                    // Initialize Notification checks

                        notificationManager.runCheck();
                        if (window.notifInterval) clearInterval(window.notifInterval);
                        window.notifInterval = setInterval(() => notificationManager.runCheck(), 60000);

                    // Check for lost data
                    if ((store.data.transactions || []).length === 0 && (store.data.loans || []).length === 0 && store.hasLegacyData()) {
                        const recover = confirm('We found data from a previous version of the app. Would you like to import it into your current profile?');

                    }
                });
            },
            refresh: () => {
                render[router.current]();
                ui.populateMonthSelect(); // Update in case new months added
            },
            processRecurring: () => {
                const monthKey = currentMonth;
                const y = parseInt(monthKey.slice(0, 4), 10);
                const m = parseInt(monthKey.slice(5, 7), 10) - 1;
                const now = new Date();
                (store.data.recurringExpenses || []).forEach(r => {
                    if (r.lastProcessed === monthKey) return;
                    const lastDay = new Date(y, m + 1, 0).getDate();
                    const dueDay = Math.max(1, Math.min(lastDay, r.day || 1));
                    const dueDate = new Date(y, m, dueDay);
                    if (now >= dueDate) {
                        const exists = (store.data.transactions || []).some(t => t.type === 'expense' && t.category === r.category && t.date.startsWith(monthKey));
                        if (!exists) {
                            const dateStr = `${monthKey}-${String(dueDay).padStart(2, '0')}`;
                            store.addTransaction({ type: 'expense', amount: r.amount, category: r.category, date: dateStr, note: r.note || 'Recurring Expense', accountId: 'cash' });
                        }
                        store.updateRecurringExpense(r.id, { lastProcessed: monthKey });
                    }
                });
            },
            handleSubmitTransaction: (e, type) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const tx = {
                    type,
                    amount: +formData.get('amount'),
                    category: formData.get('category'),
                    payee: formData.get('payee'),
                    date: formData.get('date'),
                    note: formData.get('note'),
                    accountId: formData.get('accountId'),
                    paymentMode: formData.get('paymentMode')
                };
                store.addTransaction(tx);
                if (type === 'expense' && formData.get('recurring') === 'on') {
                    const day = Math.max(1, Math.min(31, +(formData.get('recurringDay') || new Date(tx.date).getDate())));
                    store.addRecurringExpense({
                        category: tx.category,
                        amount: tx.amount,
                        note: tx.note || '',
                        day: day,
                        lastProcessed: tx.date.slice(0, 7)
                    });
                }
                ui.closeModal();
            },
            handleSubmitSmartSave: (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const goal = {
                    name: formData.get('name'),
                    targetAmount: +formData.get('targetAmount'),
                    savedAmount: +formData.get('savedAmount'),
                    targetDate: formData.get('targetDate'),
                    priority: formData.get('priority'),
                    type: formData.get('type'),
                    notes: formData.get('notes'),
                    downPayment: 0, // Placeholder
                    emi: 0 // Placeholder
                };
                store.addSmartSave(goal);
                ui.closeModal();
                render.smartSave();
            },
            toggleSavingsFields: (type) => {
                const sipFields = document.getElementById('sipFields');
                const fdFields = document.getElementById('fdFields');
                
                if (type === 'sip') {
                    sipFields.classList.remove('hidden');
                    fdFields.classList.add('hidden');
                } else if (type === 'fd') {
                    sipFields.classList.add('hidden');
                    fdFields.classList.remove('hidden');
                } else {
                    sipFields.classList.add('hidden');
                    fdFields.classList.add('hidden');
                }
            },
            handleAddSavings: (e, id) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const amount = +formData.get('amount');
                const accountId = formData.get('accountId');
                const savingsType = formData.get('savingsType');
                
                const goal = store.data.smartSave.find(g => g.id === id);
                if (goal) {
                    const currentSaved = goal.savedAmount || 0;
                    if (currentSaved + amount > goal.targetAmount) {
                        alert(`You cannot save more than the target amount. Maximum allowed: ${utils.formatCurrency(goal.targetAmount - currentSaved)}`);
                        return;
                    }

                    // Prepare Contribution Object
                    const contribution = {
                        id: utils.uid(),
                        date: new Date().toISOString(),
                        amount: amount,
                        type: savingsType,
                        accountId: accountId
                    };

                    // Add type-specific details
                    if (savingsType === 'sip') {
                        const nav = +formData.get('nav');
                        if (nav > 0) {
                            contribution.nav = nav;
                            contribution.units = amount / nav;
                        }
                    } else if (savingsType === 'fd') {
                        contribution.interestRate = +formData.get('interestRate');
                        contribution.maturityDate = formData.get('maturityDate');
                    }

                    // Update Goal History
                    if (!goal.history) goal.history = [];
                    goal.history.push(contribution);

                    const newSavedAmount = currentSaved + amount;
                    store.updateSmartSave(id, { savedAmount: newSavedAmount, history: goal.history });
                    
                    // If source account selected, deduct as expense
                    if (accountId) {
                        store.addTransaction({
                            type: 'expense',
                            amount: amount,
                            category: 'Savings',
                            payee: 'Self (Savings Goal)',
                            date: new Date().toISOString().split('T')[0],
                            note: `Contribution to ${goal.name} (${savingsType ? savingsType.toUpperCase() : 'General'})`,
                            accountId: accountId,
                            paymentMode: 'Transfer'
                        });
                    }
                    
                    ui.closeModal();
                    render.smartSave();
                }
            },
            importStatementEntries: () => {
                const st = ui.statementImportState;
                if (!st || !Array.isArray(st.entries)) return;
                const selected = st.entries.filter(e => e && e.selected);
                if (!selected.length) return;

                const existing = new Set(
                    (store.data.transactions || []).map(t => {
                        const note = (t.note || '').trim().toLowerCase();
                        const amt = Number(t.amount || 0);
                        const keyAmt = Number.isFinite(amt) ? amt.toFixed(2) : '0.00';
                        return `${t.date}|${t.type}|${keyAmt}|${note}`;
                    })
                );

                const toAdd = [];
                selected.forEach(e => {
                    const date = (e.date || '').trim();
                    const type = e.type === 'income' ? 'income' : 'expense';
                    const amount = Math.abs(parseFloat(e.amount) || 0);
                    const payee = (e.payee || '').trim();
                    const note = (e.note || '').trim();
                    const category = (e.category || 'Other').trim() || 'Other';
                    const accountId = (e.accountId || 'cash').trim() || 'cash';
                    const paymentMode = utils.inferPaymentMode({ type, category, accountId, note });

                    if (!date || !Number.isFinite(amount) || amount <= 0) return;

                    const key = `${date}|${type}|${amount.toFixed(2)}|${note.toLowerCase()}`;
                    if (existing.has(key)) return;
                    existing.add(key);

                    toAdd.push({ type, amount: Math.round(amount * 100) / 100, category, payee, date, note, accountId, paymentMode });
                });

                if (!toAdd.length) {
                    ui.closeModal();
                    return;
                }

                store.addTransactionsBatch(toAdd);
                ui.statementImportState = null;
                ui.closeModal();
            },
            handleSubmitCard: (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                store.addCreditCard({
                    name: formData.get('name'),
                    limit: +formData.get('limit'),
                    billingDay: +formData.get('billingDay'),
                    dueDay: +formData.get('dueDay'),

                const formData = new FormData(e.target);
                const freq = formData.get('frequency');

                const d = new Date(start);
                const next = new Date(d);
                if (freq === 'monthly') next.setMonth(next.getMonth() + 1);
                else next.setFullYear(next.getFullYear() + 1);
                const nextStr = next.toISOString().split('T')[0];
                store.addInsurance({
                    type: formData.get('type') || 'Term',
                    provider: formData.get('provider'),
                    policyNumber: formData.get('policyNumber'),
                    premium: +formData.get('premium'),
                    sumAssured: +formData.get('sumAssured'),
                    frequency: freq,
                    startDate: start,
                    endDate: formData.get('endDate'),
                    nextDueDate: nextStr
                });
                ui.closeModal();
            },
            handleSubmitPremium: (e, insId) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const p = (store.data.insurances || []).find(i => i.id === insId);
                if (!p) { ui.closeModal(); return; }
                const amt = +formData.get('amount');
                const date = formData.get('date');
                store.addTransaction({ type: 'expense', amount: amt, category: 'Insurance Premium', payee: formData.get('payee') || p.provider, date: date, note: `Premium: ${p.provider} ${p.policyNumber}` });
                const nd = new Date(date);
                if (p.frequency === 'monthly') nd.setMonth(nd.getMonth() + 1);
                else nd.setFullYear(nd.getFullYear() + 1);
                const ndStr = nd.toISOString().split('T')[0];
                const idx = store.data.insurances.findIndex(i => i.id === insId);
                if (idx !== -1) {
                    store.data.insurances[idx] = { ...store.data.insurances[idx], nextDueDate: ndStr };

                    ui.closeModal();
                }
                ui.closeModal();

            handleSubmitLoan: (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                store.addLoan({
                    name: formData.get('name'),
                    principal: +formData.get('principal'),
                    rate: +formData.get('rate'),
                    tenure: +formData.get('tenure'),
                    startDate: formData.get('startDate'),
                    dueDay: +formData.get('dueDay') || new Date(formData.get('startDate')).getDate(),
                    includeInTotal: formData.get('includeInTotal') === 'on'
                });
                ui.closeModal();
            },
            handleUpdateLoan: (e, id) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                store.updateLoan({
                    id: id,
                    name: formData.get('name'),
                    principal: +formData.get('principal'),
                    rate: +formData.get('rate'),
                    tenure: +formData.get('tenure'),
                    startDate: formData.get('startDate'),
                    dueDay: +formData.get('dueDay') || new Date(formData.get('startDate')).getDate(),
                    includeInTotal: formData.get('includeInTotal') === 'on'
                });
                ui.closeModal();
            },
            handleSubmitPayment: (e, loanId, type = 'emi') => {
                e.preventDefault();
                const formData = new FormData(e.target);
                store.recordLoanPayment(
                    loanId,
                    +formData.get('amount'),
                    formData.get('date')
                );
                // Also add as an expense transaction for better tracking
                let category = 'EMI';
                let notePrefix = 'EMI Payment';
                if (type === 'prepay') {
                    category = 'Loan Prepayment';
                    notePrefix = 'Lump Sum Prepayment';
                } else if (type === 'foreclose') {
                    category = 'Loan Foreclosure';
                    notePrefix = 'Full Foreclosure Payment';
                }

                const loan = (store.data.loans || []).find(l => l.id === loanId);
                store.addTransaction({
                    type: 'expense',
                    amount: +formData.get('amount'),
                    category: category,
                    payee: loan ? loan.name : 'Loan Provider',
                    date: formData.get('date'),
                    note: notePrefix + ' for loan'
                });
                ui.closeModal();
            },
            handleSubmitCardPayment: (e, cardId) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const amount = +formData.get('amount');
                const date = formData.get('date');
                
                const card = (store.data.creditCards || []).find(c => c.id === cardId);
                // Add transaction: Expense (Transfer) to pay off card
                store.addTransaction({
                    type: 'expense',
                    amount: amount,
                    category: 'Credit Card Bill',
                    payee: card ? card.name : 'Credit Card',
                    date: date,
                    note: 'Bill Payment',
                    accountId: cardId // Linked to card so it reduces balance
                });
                ui.closeModal();
            },
            handleSubmitRateChange: (e, loanId) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                store.changeLoanRate(loanId, +formData.get('rate'), formData.get('date'));
                ui.closeModal();
            },
        };

        // Initialize Store after App definition
        try {
            store = new Store();
        } catch (e) {
            console.error("Store init failed", e);
            alert("Critical Error: Storage initialization failed. Please check console.");
        }

        // Boot
        window.addEventListener('DOMContentLoaded', app.init);

    </script>
</body>
</html>
