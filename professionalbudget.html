<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProFinance v4 — Startup UI</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0B0B0F;
  --card:#15151B;
  --border:#262631;
  --text:#F5F5F7;
  --muted:#9CA3AF;
  --primary:#7C5CFF;
  --success:#22C55E;
  --danger:#EF4444;
  --warn:#F59E0B;
}

.light{
  --bg:#F8FAFC;
  --card:#FFFFFF;
  --border:#E5E7EB;
  --text:#0F172A;
  --muted:#64748B;
}

*{box-sizing:border-box}
body{margin:0;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

.app{display:flex;height:100vh}

/* SIDEBAR */

aside{
  width:260px;background:var(--card);
  border-right:1px solid var(--border);
  padding:20px;display:flex;flex-direction:column
}

.logo{font-weight:800;font-size:20px;margin-bottom:30px}

.nav-item{
  padding:14px;border-radius:12px;cursor:pointer;
  color:var(--muted);margin-bottom:6px
}
.nav-item:hover{background:#1E1E26;color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,#7C5CFF,#5B3FFF);color:#fff}

/* MAIN */

main{flex:1;display:flex;flex-direction:column}

header{
  height:60px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px
}

.content{flex:1;overflow:auto;padding:20px}

/* CARD */

.card{
  background:var(--card);
  border-radius:18px;padding:20px;
  border:1px solid var(--border);
  margin-bottom:16px
}

.grid{display:grid;gap:16px}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.grid-main{grid-template-columns:2fr 1fr}

/* KPI */

.kpi{display:flex;justify-content:space-between;align-items:center}
.kpi-value{font-size:26px;font-weight:800}

/* ROW */

.row{
  display:flex;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border)
}

/* BUTTON */

.btn{
  background:linear-gradient(135deg,#7C5CFF,#5B3FFF);
  color:white;border:none;padding:10px 16px;
  border-radius:10px;cursor:pointer;font-weight:600
}

/* MODAL */

.modal{
  position:fixed;inset:0;background:#0009;
  display:none;align-items:center;justify-content:center
}

.modal-box{
  background:var(--card);padding:20px;border-radius:16px;width:90%;max-width:420px
}

/* TOAST */

.toast{
  position:fixed;bottom:20px;right:20px;
  background:var(--card);padding:12px 18px;border-radius:10px;
  border:1px solid var(--border);display:none
}

/* MOBILE */

.bottom-nav{display:none}

@media(max-width:768px){
  aside{display:none}
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--card);border-top:1px solid var(--border);
    justify-content:space-around;padding:10px
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside>
    <div class="logo">💳 ProFinance</div>

    <div class="nav-item active" onclick="go('dashboard')">Dashboard</div>
    <div class="nav-item" onclick="go('accounts')">Accounts</div>
    <div class="nav-item" onclick="go('transactions')">Transactions</div>
    <div class="nav-item" onclick="go('budgets')">Budgets</div>
    <div class="nav-item" onclick="go('goals')">Goals</div>
    <div class="nav-item" onclick="go('analytics')">Analytics</div>
  </aside>

  <!-- MAIN -->
  <main>

    <header>
      <div id="title">Dashboard</div>
      <div>
        <button class="btn" onclick="openTx()">+ Add</button>
        <button class="btn" onclick="toggleTheme()">🌗</button>
      </div>
    </header>

    <div class="content" id="content"></div>

  </main>
</div>

<!-- MOBILE NAV -->
<div class="bottom-nav">
  <button onclick="go('dashboard')">🏠</button>
  <button onclick="openTx()">＋</button>
  <button onclick="go('transactions')">📋</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>Add Transaction</h3>
    <input id="note" placeholder="Note" style="width:100%;margin:8px 0">
    <input id="amount" type="number" placeholder="Amount" style="width:100%;margin:8px 0">
    <select id="type" style="width:100%;margin:8px 0">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <button class="btn" onclick="addTx()">Save</button>
  </div>
</div>

<div class="toast" id="toast">Saved</div>

<script>
let page="dashboard"

let db=JSON.parse(localStorage.getItem("pf_v4"))||{
  tx:[
    {note:"Salary",amount:85000,type:"income"},
    {note:"Groceries",amount:3200,type:"expense"}
  ],
  accounts:[
    {name:"Bank",balance:120000},
    {name:"Cash",balance:8000}
  ],
  goals:[
    {name:"Emergency Fund",saved:60000,target:100000}
  ]
}

function save(){localStorage.setItem("pf_v4",JSON.stringify(db))}

function toggleTheme(){document.body.classList.toggle("light")}

function go(p){page=p;title.textContent=p.toUpperCase();render()}

function openTx(){modal.style.display="flex"}
window.onclick=e=>{if(e.target.id==="modal")modal.style.display="none"}

function addTx(){
  db.tx.push({note:note.value,amount:+amount.value,type:type.value})
  save()
  modal.style.display="none"
  render()
}

function totals(){
  let inc=0,exp=0
  db.tx.forEach(t=>t.type==="income"?inc+=t.amount:exp+=t.amount)
  return {inc,exp}
}

function render(){

  const {inc,exp}=totals()

  if(page==="dashboard"){
    content.innerHTML=`
      <div class="card">
        <h2>Net Balance</h2>
        <div class="kpi-value">₹ ${inc-exp}</div>
      </div>

      <div class="grid grid-3">
        <div class="card kpi"><div><div>Income</div><div class="kpi-value" style="color:var(--success)">₹ ${inc}</div></div>📈</div>
        <div class="card kpi"><div><div>Expense</div><div class="kpi-value" style="color:var(--danger)">₹ ${exp}</div></div>📉</div>
      </div>

      <div class="grid grid-main">
        <div class="card"><canvas id="chart"></canvas></div>
        <div class="card"><h3>Goals</h3>
          ${db.goals.map(g=>`
            <div class="row">
              <span>${g.name}</span>
              <span>${Math.round(g.saved/g.target*100)}%</span>
            </div>`).join("")}
        </div>
      </div>
    `

    new Chart(chart,{
      type:"bar",
      data:{
        labels:["Income","Expense"],
        datasets:[{
          data:[inc,exp],
          backgroundColor:["#22C55E","#EF4444"],
          borderRadius:8
        }]
      },
      options:{plugins:{legend:{display:false}}}
    })
  }

  if(page==="accounts"){
    content.innerHTML=`
      <div class="card">
        <h2>Accounts</h2>
        ${db.accounts.map(a=>`
          <div class="row"><span>${a.name}</span><span>₹ ${a.balance}</span></div>
        `).join("")}
      </div>
    `
  }

  if(page==="transactions"){
    content.innerHTML=`
      <div class="card">
        <h2>Transactions</h2>
        ${db.tx.map(t=>`
          <div class="row">
            <span>${t.note}</span>
            <span style="color:${t.type==="income"?"#22C55E":"#EF4444"}">
              ${t.type==="income"?"+":"-"} ₹${t.amount}
            </span>
          </div>`).join("")}
      </div>
    `
  }

  if(page==="goals"){
    content.innerHTML=`
      <div class="card">
        <h2>Goals</h2>
        ${db.goals.map(g=>`
          <div class="row">
            <span>${g.name}</span>
            <span>₹ ${g.saved}/${g.target}</span>
          </div>`).join("")}
      </div>
    `
  }

  if(page==="analytics"){
    content.innerHTML=`
      <div class="card">
        <h2>Analytics</h2>
        <p>Advanced insights coming soon.</p>
      </div>
    `
  }
}

render()
</script>

</body>
</html>
